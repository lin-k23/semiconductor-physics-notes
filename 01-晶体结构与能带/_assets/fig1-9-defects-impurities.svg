<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="vacancy interstitial substitutional impurity">
  <title>Defects and impurities in a crystal lattice</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.pt{fill:#222}.miss{fill:white;stroke:#13a8df;stroke-width:3;stroke-dasharray:5 4}.imp{fill:#13a8df;stroke:#111;stroke-width:2}.line{stroke:#ccc;stroke-width:1}.label{font:18px Arial,sans-serif;fill:#111}.small{font:14px Arial,sans-serif;fill:#333}</style>
  <defs><g id="grid"><line class="line" x1="0" y1="0" x2="240" y2="0"/><line class="line" x1="0" y1="50" x2="240" y2="50"/><line class="line" x1="0" y1="100" x2="240" y2="100"/><line class="line" x1="0" y1="150" x2="240" y2="150"/><line class="line" x1="0" y1="200" x2="240" y2="200"/><line class="line" x1="0" y1="0" x2="0" y2="200"/><line class="line" x1="60" y1="0" x2="60" y2="200"/><line class="line" x1="120" y1="0" x2="120" y2="200"/><line class="line" x1="180" y1="0" x2="180" y2="200"/><line class="line" x1="240" y1="0" x2="240" y2="200"/></g><g id="pts"><circle class="pt" cx="0" cy="0" r="5"/><circle class="pt" cx="60" cy="0" r="5"/><circle class="pt" cx="120" cy="0" r="5"/><circle class="pt" cx="180" cy="0" r="5"/><circle class="pt" cx="240" cy="0" r="5"/><circle class="pt" cx="0" cy="50" r="5"/><circle class="pt" cx="60" cy="50" r="5"/><circle class="pt" cx="120" cy="50" r="5"/><circle class="pt" cx="180" cy="50" r="5"/><circle class="pt" cx="240" cy="50" r="5"/><circle class="pt" cx="0" cy="100" r="5"/><circle class="pt" cx="60" cy="100" r="5"/><circle class="pt" cx="120" cy="100" r="5"/><circle class="pt" cx="180" cy="100" r="5"/><circle class="pt" cx="240" cy="100" r="5"/><circle class="pt" cx="0" cy="150" r="5"/><circle class="pt" cx="60" cy="150" r="5"/><circle class="pt" cx="120" cy="150" r="5"/><circle class="pt" cx="180" cy="150" r="5"/><circle class="pt" cx="240" cy="150" r="5"/><circle class="pt" cx="0" cy="200" r="5"/><circle class="pt" cx="60" cy="200" r="5"/><circle class="pt" cx="120" cy="200" r="5"/><circle class="pt" cx="180" cy="200" r="5"/><circle class="pt" cx="240" cy="200" r="5"/></g></defs>
  <g transform="translate(70,60)"><use href="#grid"/><use href="#pts"/><circle class="miss" cx="120" cy="100" r="12"/><text class="label" x="55" y="260">Vacancy</text><text class="small" x="22" y="285">missing atom at a lattice site</text></g>
  <g transform="translate(370,60)"><use href="#grid"/><use href="#pts"/><circle class="imp" cx="150" cy="125" r="13"/><text class="label" x="60" y="260">Interstitial</text><text class="small" x="25" y="285">extra atom between normal sites</text></g>
  <g transform="translate(670,60)"><use href="#grid"/><use href="#pts"/><circle class="imp" cx="120" cy="100" r="13"/><text class="label" x="20" y="260">Substitutional impurity</text><text class="small" x="7" y="285">foreign atom replaces a host atom</text></g>
</svg>