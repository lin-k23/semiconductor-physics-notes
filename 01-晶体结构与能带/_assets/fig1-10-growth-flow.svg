<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="420" viewBox="0 0 1050 420" role="img" aria-label="semiconductor material growth flow">
  <title>Semiconductor material growth: Czochralski, wafer, epitaxy</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.box{fill:#eaf8ff;stroke:#13a8df;stroke-width:2}.label{font:19px Arial,sans-serif;fill:#111;font-weight:bold}.small{font:15px Arial,sans-serif;fill:#333}.arrow{stroke:#111;stroke-width:2;marker-end:url(#arr)}.line{stroke:#333;stroke-width:2;fill:none}.melt{fill:#bfefff;stroke:#13a8df;stroke-width:2}.wafer{fill:#f7f7f7;stroke:#333;stroke-width:2}.epi{fill:#13a8df;opacity:.45;stroke:#13a8df}</style>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs>
  <rect class="box" x="30" y="40" width="260" height="330" rx="18"/><text class="label" x="55" y="78">1. Czochralski method</text><ellipse class="melt" cx="160" cy="250" rx="82" ry="32"/><path class="line" d="M78 250 L96 330 L224 330 L242 250"/><line class="line" x1="160" y1="120" x2="160" y2="215"/><polygon class="wafer" points="143,115 177,115 168,215 152,215"/><text class="small" x="70" y="350">seed + melt -> single-crystal boule</text>
  <line class="arrow" x1="300" y1="205" x2="370" y2="205"/>
  <rect class="box" x="380" y="40" width="260" height="330" rx="18"/><text class="label" x="420" y="78">2. Ingot -> wafer</text><ellipse class="wafer" cx="510" cy="180" rx="80" ry="22"/><ellipse class="wafer" cx="510" cy="220" rx="80" ry="22"/><ellipse class="wafer" cx="510" cy="260" rx="80" ry="22"/><line class="line" x1="430" y1="180" x2="430" y2="260"/><line class="line" x1="590" y1="180" x2="590" y2="260"/><text class="small" x="415" y="320">slicing, lapping, etching, polishing</text><text class="small" x="455" y="345">-> substrate</text>
  <line class="arrow" x1="650" y1="205" x2="720" y2="205"/>
  <rect class="box" x="730" y="40" width="290" height="330" rx="18"/><text class="label" x="770" y="78">3. Epitaxial growth</text><rect class="wafer" x="800" y="230" width="155" height="28"/><rect class="epi" x="800" y="200" width="155" height="30"/><line class="arrow" x1="830" y1="130" x2="830" y2="190"/><line class="arrow" x1="875" y1="115" x2="875" y2="190"/><line class="arrow" x1="920" y1="130" x2="920" y2="190"/><text class="small" x="790" y="305">single-crystal substrate</text><text class="small" x="785" y="330">homoepitaxy / heteroepitaxy</text>
</svg>