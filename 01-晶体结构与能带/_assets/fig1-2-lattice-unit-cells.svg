<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="lattice points and unit cells">
  <title>Lattice points, translation vectors, and alternative unit cells</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.p{fill:#222}.v{stroke:#13a8df;stroke-width:3;marker-end:url(#a)}.cell{fill:#c8ecfb;stroke:#222;stroke-width:2;opacity:.72}.dash{stroke:#555;stroke-width:1.5;stroke-dasharray:6 5}.l{font:18px Arial,sans-serif;fill:#111}.s{font:14px Arial,sans-serif;fill:#333}</style>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#13a8df"/></marker></defs>
  <g transform="translate(50,40)">
    <text class="l" x="0" y="0">Translation in a 2D lattice</text>
    <g class="p">
      <circle cx="20" cy="60" r="4"/><circle cx="70" cy="60" r="4"/><circle cx="120" cy="60" r="4"/><circle cx="170" cy="60" r="4"/><circle cx="220" cy="60" r="4"/>
      <circle cx="40" cy="100" r="4"/><circle cx="90" cy="100" r="4"/><circle cx="140" cy="100" r="4"/><circle cx="190" cy="100" r="4"/><circle cx="240" cy="100" r="4"/>
      <circle cx="60" cy="140" r="4"/><circle cx="110" cy="140" r="4"/><circle cx="160" cy="140" r="4"/><circle cx="210" cy="140" r="4"/><circle cx="260" cy="140" r="4"/>
      <circle cx="80" cy="180" r="4"/><circle cx="130" cy="180" r="4"/><circle cx="180" cy="180" r="4"/><circle cx="230" cy="180" r="4"/><circle cx="280" cy="180" r="4"/>
    </g>
    <line class="v" x1="110" y1="140" x2="160" y2="140"/><line class="v" x1="110" y1="140" x2="130" y2="100"/>
    <text class="s" x="160" y="160">a1</text><text class="s" x="133" y="98">b1</text>
  </g>
  <g transform="translate(430,40)">
    <text class="l" x="0" y="0">Several valid unit cells</text>
    <g class="p">
      <circle cx="0" cy="60" r="4"/><circle cx="50" cy="60" r="4"/><circle cx="100" cy="60" r="4"/><circle cx="150" cy="60" r="4"/><circle cx="200" cy="60" r="4"/><circle cx="250" cy="60" r="4"/><circle cx="300" cy="60" r="4"/><circle cx="350" cy="60" r="4"/>
      <circle cx="20" cy="100" r="4"/><circle cx="70" cy="100" r="4"/><circle cx="120" cy="100" r="4"/><circle cx="170" cy="100" r="4"/><circle cx="220" cy="100" r="4"/><circle cx="270" cy="100" r="4"/><circle cx="320" cy="100" r="4"/>
      <circle cx="40" cy="140" r="4"/><circle cx="90" cy="140" r="4"/><circle cx="140" cy="140" r="4"/><circle cx="190" cy="140" r="4"/><circle cx="240" cy="140" r="4"/><circle cx="290" cy="140" r="4"/><circle cx="340" cy="140" r="4"/>
      <circle cx="60" cy="180" r="4"/><circle cx="110" cy="180" r="4"/><circle cx="160" cy="180" r="4"/><circle cx="210" cy="180" r="4"/><circle cx="260" cy="180" r="4"/><circle cx="310" cy="180" r="4"/>
      <circle cx="80" cy="220" r="4"/><circle cx="130" cy="220" r="4"/><circle cx="180" cy="220" r="4"/><circle cx="230" cy="220" r="4"/><circle cx="280" cy="220" r="4"/><circle cx="330" cy="220" r="4"/>
    </g>
    <polygon class="cell" points="50,60 120,100 90,180 20,140"/><text class="s" x="70" y="115">A</text>
    <polygon class="cell" points="220,100 270,100 290,140 240,140"/><text class="s" x="250" y="126">B</text>
    <polygon class="cell" points="110,180 160,180 130,220 80,220"/><text class="s" x="120" y="203">C</text>
    <polygon class="cell" points="270,60 350,60 320,100 240,100"/><text class="s" x="295" y="86">D</text>
  </g>
  <text class="s" x="390" y="330">Key idea: a unit cell is not unique; a primitive cell is the smallest repeatable cell.</text>
</svg>
