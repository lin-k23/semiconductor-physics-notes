<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" role="img" aria-label="Miller indices example plane 236">
  <title>Miller indices example: intercepts 3a, 2b, 1c -> (236)</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.axis{stroke:#222;stroke-width:2;marker-end:url(#arr)}.pt{fill:#222}.plane{fill:#bfefff;stroke:#13a8df;stroke-width:3;opacity:.75}.dash{stroke:#555;stroke-width:1.5;stroke-dasharray:5 5}.l{font:19px Arial,sans-serif;fill:#111}.s{font:15px Arial,sans-serif;fill:#333}.blue{fill:#13a8df;font-weight:bold}</style>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#222"/></marker></defs>
  <text class="l" x="180" y="40">Crystal plane and Miller indices</text>
  <line class="axis" x1="180" y1="360" x2="560" y2="360"/><text class="s" x="565" y="365">b-axis</text>
  <line class="axis" x1="180" y1="360" x2="330" y2="150"/><text class="s" x="335" y="150">a-axis</text>
  <line class="axis" x1="180" y1="360" x2="180" y2="90"/><text class="s" x="155" y="85">c-axis</text>
  <polygon class="plane" points="420,360 315,170 180,180"/>
  <line class="dash" x1="315" y1="170" x2="420" y2="360"/><line class="dash" x1="180" y1="180" x2="315" y2="170"/>
  <g class="pt"><circle cx="180" cy="300" r="5"/><circle cx="180" cy="240" r="5"/><circle cx="180" cy="180" r="5"/><circle cx="260" cy="360" r="5"/><circle cx="340" cy="360" r="5"/><circle cx="420" cy="360" r="5"/><circle cx="230" cy="290" r="5"/><circle cx="280" cy="220" r="5"/><circle cx="315" cy="170" r="5"/></g>
  <text class="s" x="320" y="170">3a</text><text class="s" x="420" y="382">2b</text><text class="s" x="188" y="180">1c</text>
  <text class="s" x="95" y="420">Steps: intercepts = (3, 2, 1) -> reciprocals = (1/3, 1/2, 1) -> multiply by 6 -> </text>
  <text class="s blue" x="650" y="420">(236)</text>
</svg>