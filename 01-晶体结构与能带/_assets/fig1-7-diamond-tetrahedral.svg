<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" role="img" aria-label="diamond structure tetrahedral bonding">
  <title>Diamond structure and tetrahedral nearest neighbors</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.edge{stroke:#222;stroke-width:2;fill:none}.dash{stroke:#777;stroke-width:1.4;stroke-dasharray:5 5}.atom{fill:white;stroke:#222;stroke-width:2}.si{fill:#dff5ff;stroke:#111;stroke-width:2}.bond{stroke:#13a8df;stroke-width:5;stroke-linecap:round}.l{font:19px Arial,sans-serif;fill:#111}.s{font:14px Arial,sans-serif;fill:#333}</style>
  <text class="l" x="70" y="38">Diamond lattice: FCC + two-atom basis</text>
  <g transform="translate(70,80)">
    <path class="edge" d="M35 235 L250 235 L320 165 L105 165 Z M35 65 L250 65 L320 -5 L105 -5 Z M35 65 L35 235 M250 65 L250 235 M320 -5 L320 165 M105 -5 L105 165"/>
    <path class="dash" d="M35 65 L105 -5 M35 235 L105 165 M250 235 L320 165"/>
    <g class="atom"><circle cx="35" cy="65" r="10"/><circle cx="250" cy="65" r="10"/><circle cx="320" cy="-5" r="10"/><circle cx="105" cy="-5" r="10"/><circle cx="35" cy="235" r="10"/><circle cx="250" cy="235" r="10"/><circle cx="320" cy="165" r="10"/><circle cx="105" cy="165" r="10"/></g>
    <circle class="si" cx="165" cy="115" r="14"/>
    <line class="bond" x1="165" y1="115" x2="105" y2="165"/><line class="bond" x1="165" y1="115" x2="250" y2="65"/><line class="bond" x1="165" y1="115" x2="250" y2="235"/><line class="bond" x1="165" y1="115" x2="105" y2="-5"/>
    <text class="s" x="70" y="285">Si and Ge: diamond structure, 4 nearest neighbors</text>
  </g>
  <g transform="translate(520,85)">
    <text class="l" x="0" y="0">Tetrahedral coordination</text>
    <circle class="si" cx="145" cy="145" r="16"/><circle class="atom" cx="70" cy="70" r="12"/><circle class="atom" cx="230" cy="85" r="12"/><circle class="atom" cx="70" cy="230" r="12"/><circle class="atom" cx="245" cy="230" r="12"/>
    <line class="bond" x1="145" y1="145" x2="70" y2="70"/><line class="bond" x1="145" y1="145" x2="230" y2="85"/><line class="bond" x1="145" y1="145" x2="70" y2="230"/><line class="bond" x1="145" y1="145" x2="245" y2="230"/>
    <text class="s" x="20" y="300">sp3-like covalent bonds form a tetrahedron</text>
  </g>
</svg>