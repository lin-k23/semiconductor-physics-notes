<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="simple cubic body centered cubic face centered cubic">
  <title>Basic crystal structures: SC, BCC, FCC</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.edge{stroke:#222;stroke-width:2;fill:none}.dash{stroke:#555;stroke-width:1.6;stroke-dasharray:5 5}.atom{fill:#222}.center{fill:#13a8df;stroke:#111;stroke-width:1.5}.label{font:19px Arial,sans-serif;fill:#111}.small{font:14px Arial,sans-serif;fill:#333}</style>
  <defs>
    <g id="cube"><path class="edge" d="M40 190 L170 190 L210 150 L80 150 Z M40 70 L170 70 L210 30 L80 30 Z M40 70 L40 190 M170 70 L170 190 M210 30 L210 150 M80 30 L80 150"/><path class="dash" d="M40 70 L80 30 M170 190 L210 150 M40 190 L80 150"/></g>
    <g id="corners"><circle class="atom" cx="40" cy="70" r="7"/><circle class="atom" cx="170" cy="70" r="7"/><circle class="atom" cx="210" cy="30" r="7"/><circle class="atom" cx="80" cy="30" r="7"/><circle class="atom" cx="40" cy="190" r="7"/><circle class="atom" cx="170" cy="190" r="7"/><circle class="atom" cx="210" cy="150" r="7"/><circle class="atom" cx="80" cy="150" r="7"/></g>
  </defs>
  <g transform="translate(30,55)"><use href="#cube"/><use href="#corners"/><text class="label" x="30" y="245">Simple cubic (SC)</text><text class="small" x="32" y="272">8 corners × 1/8 = 1 atom/cell</text></g>
  <g transform="translate(360,55)"><use href="#cube"/><use href="#corners"/><circle class="center" cx="125" cy="110" r="8"/><text class="label" x="8" y="245">Body-centered cubic (BCC)</text><text class="small" x="12" y="272">corners + 1 body center = 2 atoms/cell</text></g>
  <g transform="translate(690,55)"><use href="#cube"/><use href="#corners"/><circle class="center" cx="105" cy="70" r="7"/><circle class="center" cx="125" cy="110" r="7"/><circle class="center" cx="150" cy="50" r="7"/><circle class="center" cx="105" cy="190" r="7"/><circle class="center" cx="190" cy="110" r="7"/><circle class="center" cx="60" cy="110" r="7"/><text class="label" x="0" y="245">Face-centered cubic (FCC)</text><text class="small" x="0" y="272">corners + 6 faces × 1/2 = 4 atoms/cell</text></g>
</svg>