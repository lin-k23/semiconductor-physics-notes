<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-label="generalized 3D unit cell with lattice vectors">
  <title>Generalized 3D unit cell</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.e{stroke:#222;stroke-width:2;fill:none}.d{stroke:#777;stroke-width:1.6;stroke-dasharray:5 5}.p{fill:#222}.v{stroke:#13a8df;stroke-width:4;marker-end:url(#a)}.l{font:20px Arial,sans-serif;fill:#111}.s{font:16px Arial,sans-serif;fill:#333}</style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#13a8df"/></marker></defs>
  <text class="l" x="190" y="40">Generalized unit cell</text>
  <path class="e" d="M180,300 L390,300 L490,220 L280,220 Z M180,120 L390,120 L490,40 L280,40 Z M180,120 L180,300 M390,120 L390,300 M490,40 L490,220 M280,40 L280,220"/>
  <path class="d" d="M180,120 L280,40 M180,300 L280,220 M390,300 L490,220"/>
  <g class="p"><circle cx="180" cy="300" r="6"/><circle cx="390" cy="300" r="6"/><circle cx="490" cy="220" r="6"/><circle cx="280" cy="220" r="6"/><circle cx="180" cy="120" r="6"/><circle cx="390" cy="120" r="6"/><circle cx="490" cy="40" r="6"/><circle cx="280" cy="40" r="6"/></g>
  <line class="v" x1="180" y1="300" x2="390" y2="300"/><line class="v" x1="180" y1="300" x2="280" y2="220"/><line class="v" x1="180" y1="300" x2="180" y2="120"/>
  <text class="s" x="285" y="325">a</text><text class="s" x="235" y="250">b</text><text class="s" x="155" y="210">c</text>
  <text class="s" x="140" y="375">r = p a + q b + s c, where p, q, s are integers</text>
</svg>
