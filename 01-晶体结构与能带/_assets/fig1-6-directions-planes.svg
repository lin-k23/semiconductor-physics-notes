<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="370" viewBox="0 0 1000 370" role="img" aria-label="crystal directions and planes 100 110 111">
  <title>Directions and planes in a cubic lattice: [100], [110], [111]</title>
  <rect width="100%" height="100%" fill="white"/>
  <style>.edge{stroke:#222;stroke-width:2;fill:none}.dash{stroke:#666;stroke-width:1.4;stroke-dasharray:5 5}.atom{fill:#222}.plane{fill:#bfefff;stroke:#13a8df;stroke-width:2;opacity:.65}.vec{stroke:#111;stroke-width:3;marker-end:url(#arr)}.l{font:18px Arial,sans-serif;fill:#111}.s{font:14px Arial,sans-serif;fill:#333}</style>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker><g id="cube"><path class="edge" d="M40 205 L170 205 L215 160 L85 160 Z M40 75 L170 75 L215 30 L85 30 Z M40 75 L40 205 M170 75 L170 205 M215 30 L215 160 M85 30 L85 160"/><path class="dash" d="M40 75 L85 30 M40 205 L85 160 M170 205 L215 160"/><g class="atom"><circle cx="40" cy="75" r="5"/><circle cx="170" cy="75" r="5"/><circle cx="215" cy="30" r="5"/><circle cx="85" cy="30" r="5"/><circle cx="40" cy="205" r="5"/><circle cx="170" cy="205" r="5"/><circle cx="215" cy="160" r="5"/><circle cx="85" cy="160" r="5"/></g></g></defs>
  <g transform="translate(70,55)"><use href="#cube"/><polygon class="plane" points="40,75 40,205 85,160 85,30"/><line class="vec" x1="105" y1="140" x2="40" y2="205"/><text class="l" x="80" y="260">(100) plane / [100]</text></g>
  <g transform="translate(390,55)"><use href="#cube"/><polygon class="plane" points="40,75 170,75 215,160 85,160"/><line class="vec" x1="105" y1="140" x2="215" y2="205"/><text class="l" x="75" y="260">(110) plane / [110]</text></g>
  <g transform="translate(710,55)"><use href="#cube"/><polygon class="plane" points="40,205 170,75 215,160"/><line class="vec" x1="105" y1="140" x2="215" y2="30"/><text class="l" x="70" y="260">(111) plane / [111]</text></g>
  <text class="s" x="230" y="340">In simple cubic systems, [hkl] is perpendicular to (hkl); this is not generally true for non-cubic lattices.</text>
</svg>